<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StompDonkeys Disc Golf</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Existing Styles */
        .details td {
            padding: 8px;
            text-align: center;
        }
        .ace-alert {
            color: #FF0000; 
            font-weight: bold;
            margin-left: 10px;
        }
        .ace-note {
            color: #66FF66;
            font-weight: bold;
            margin-top: 5px;
        }

        /* --- New Scoped Table Fixes --- */
        
        /* Ensure the details container allows horizontal scrolling if the table is wide */
        .round-details {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 15px;
            margin-top: 10px;
        }

        .round-details table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto; /* Allows columns to breathe */
            min-width: 800px;    /* Forces a minimum width to prevent squeezing 18 holes */
        }

        .round-details th, 
        .round-details td {
            padding: 10px 5px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            /* Minimum width for hole columns */
            min-width: 38px; 
        }

        /* Wider column for the Player names */
        .round-details th:first-child, 
        .round-details td:first-child {
            min-width: 110px;
            text-align: left;
            padding-left: 12px;
            position: sticky; /* Optional: keeps names visible while scrolling holes */
            left: 0;
            background: #fff;
            z-index: 1;
        }

        /* Header specific styling */
        .round-details thead th {
            background-color: #FFCA28;
            color: #424242;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <button class="hamburger" aria-label="Toggle Menu">☰</button>
        <h1>STOMPDONKEYS DISC GOLF</h1>
    </header>
    <nav class="sidebar" style="display: none;">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="rounds.html">Rounds</a></li>
            <li><a href="records.html">Records</a></li>
            <li><a href="players.html">Players</a></li>
            <li><a href="trends.html">Performance Trends</a></li>
            <li><a href="awards.html">Awards</a></li>
            <li><a href="data.csv" download class="nav-download">Download Data</a></li>
        </ul>
    </nav>
    <main>
        <section class="records-section">
            <h2>Rounds</h2>
            <div id="stats-container" class="records-container"></div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <script type="module" src="js/pages/rounds.js?v=2"></script>
</body>
</html>
