<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StompDonkeys Disc Golf</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
    <header class="main-header">
        <button class="hamburger" aria-label="Toggle Menu">☰</button>
        <h1>STOMPDONKEYS DISC GOLF</h1>
    </header>
    <nav class="sidebar" style="display: none;">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="rounds.html">Rounds</a></li>
            <li><a href="records.html">Records</a></li>
            <li><a href="players.html">Players</a></li>
            <li><a href="trends.html">Performance Trends</a></li>
            <li><a href="awards.html">Awards</a></li>
            <li><a href="data.csv" download class="nav-download">Download Data</a></li>
        </ul>
    </nav>
    <main>
        <h2 class="page-title">PLAYER PROFILES</h2>
        <section class="player-controls">
            <div class="control">
                <label for="playerSelect">Player</label>
                <select id="playerSelect" aria-label="Select Player"></select>
            </div>
            <div class="control">
                <label for="yearFilter">Year</label>
                <select id="yearFilter" aria-label="Select Year"></select>
            </div>
            <div class="control">
                <label for="compareSelect">Compare with</label>
                <select id="compareSelect" aria-label="Compare with Player"></select>
            </div>
        </section>
        <div id="player-profiles"></div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0/papaparse.min.js"></script>
    <script type="module" src="js/pages/players.js?v=5"></script>
